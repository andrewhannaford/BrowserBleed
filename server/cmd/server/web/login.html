<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrowserBleed Reports - Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px 40px; width: 100%; max-width: 360px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #e6edf3; text-align: center; }
  label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
  input[type=password] { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none; }
  input[type=password]:focus { border-color: #58a6ff; }
  button { width: 100%; margin-top: 16px; padding: 9px; background: #238636; border: 1px solid #2ea043; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
  button:hover { background: #2ea043; }
  .error { margin-top: 14px; padding: 10px 12px; background: #3d1f1f; border: 1px solid #f85149; border-radius: 6px; color: #f85149; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <h1>BrowserBleed Reports</h1>
  <form method="POST" action="/login">
    <label for="key">API Key</label>
    <input type="password" id="key" name="key" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  </form>
</div>
</body>
</html>
