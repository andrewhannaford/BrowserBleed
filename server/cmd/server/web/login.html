<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrowserBleed — Sign in</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGMxMCIvPjxwYXRoIGQ9Ik0xNiA2QzE2IDYgOCAxNiA4IDIxYTggOCAwIDAgMCAxNiAwYzAtNS04LTE1LTgtMTV6IiBmaWxsPSIjZjg1MTQ5Ii8+PC9zdmc+">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #10141a;
    --border: #1e2530;
    --border-hover: #2d3748;
    --text: #cdd5e0;
    --text-dim: #5a6478;
    --accent: #4f8ef7;
    --red: #f85149;
    --radius: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px; width: 100%; max-width: 380px; }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .brand-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; opacity: 0.6; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  input[type=password] { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
  input[type=password]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
  button { width: 100%; margin-top: 18px; padding: 10px; background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.4); border-radius: 6px; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, border-color 0.15s; }
  button:hover { background: rgba(79,142,247,0.25); border-color: var(--accent); }
  .error { margin-top: 14px; padding: 10px 14px; background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); border-radius: 6px; color: var(--red); font-size: 13px; }

  @media (max-width: 480px) {
    body { padding: 0 16px; }
    .card { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">BrowserBleed</div>
    <div class="brand-sub">Reports Portal</div>
  </div>
  <form method="POST" action="/login">
    <label for="key">API Key</label>
    <input type="password" id="key" name="key" autofocus autocomplete="current-password" placeholder="Enter your API key">
    <button type="submit">Sign in</button>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  </form>
</div>
</body>
</html>
